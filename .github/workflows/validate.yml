name: validate Factorio Mod

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - V2.1

jobs:
  validate-mod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: V2.1

      - name: Validate Mod
        uses: xyzzycgn/factorio-mod-uploader-action@2.0.7
        with:
          action: validate
