name: Publish Factorio Mod 2.1

on:
  push:
    tags:
      - '1.1.[0-9]*'

permissions:
  contents: write

jobs:
  publish-mod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: V2.1

      - name: Validate Mod
        uses: xyzzycgn/factorio-mod-uploader-action@2.0.7
        with:
          action: validate

      - name: Create zip
        uses: xyzzycgn/factorio-mod-uploader-action@2.0.7
        with:
          action: compress

      - name: Upload Mod
        uses: xyzzycgn/factorio-mod-uploader-action@2.0.7
        with:
          action: upload
          factorio-api-key: ${{ secrets.FACTORIO_API_KEY }}

  call-update-version:
    uses: ./.github/workflows/update_version.yml
